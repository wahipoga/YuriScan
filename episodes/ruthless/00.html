<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="monetag" content="6fe1c92e3fc06847c7360277151ab602">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>YuriScan - Leitura: Ruthless Capítulo 01</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/Df60WbW7/381-Sem-T-tulo-20260302131259.png">
    <link rel="shortcut icon" type="image/png" href="https://i.ibb.co/Df60WbW7/381-Sem-T-tulo-20260302131259.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Helvetica Neue', system-ui, -apple-system, sans-serif;
        }

        :root {
            --bg-primary: #0a0c0f;
            --bg-secondary: #14181c;
            --bg-card: #1e2329;
            --accent: #ff7b9c;
            --accent-hover: #ff9bb3;
            --text-primary: #ffffff;
            --text-secondary: #b0b8c5;
            --border-color: #2a313c;
            --header-height: 70px;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            background-color: #0f1217;
            border-bottom: 2px solid var(--accent);
            padding: 0.8rem 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            min-height: var(--header-height);
        }

        .logo {
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #ffa7b9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .logo span {
            background: none;
            -webkit-text-fill-color: var(--accent);
            font-weight: 300;
        }

        /* Container principal */
        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 1rem 4%;
            flex: 1;
        }

        /* Card do capítulo */
        .chapter-card {
            background: linear-gradient(145deg, #1a1217, #1e1a1d);
            border: 2px solid var(--accent);
            border-radius: 30px;
            padding: 2rem 1.5rem;
            margin: 2rem 0;
            text-align: center;
        }

        .manga-title {
            font-size: clamp(2rem, 6vw, 2.8rem);
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .chapter-title {
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        /* Botão */
        .btn-voltar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.3s;
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-voltar:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        /* Área de imagens - DISTÂNCIA REDUZIDA */
        .images-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem; /* Reduzido de 1.5rem para 0.25rem */
            margin: 1rem 0; /* Reduzido de 2rem para 1rem */
        }

        .page-image {
            max-width: 100%;
            border-radius: 0; /* Removido border-radius */
            overflow: hidden;
            border: none; /* Removido border */
            /* Removido transition e hover */
        }

        .page-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Seção de Comentários */
        .comments-section {
            background: var(--bg-card);
            border: 2px solid var(--accent);
            border-radius: 30px;
            padding: 2rem 1.5rem;
            margin: 3rem 0 2rem 0;
        }

        .comments-title {
            color: var(--accent);
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        /* Estilo para o Disqus */
        #disqus_thread {
            color: var(--text-primary);
        }

        /* Footer */
        footer {
            background-color: #0f1217;
            border-top: 2px solid var(--accent);
            padding: 2rem 4%;
            margin-top: 3rem;
            text-align: center;
            color: #4a525f;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .chapter-card {
                padding: 1.5rem 1rem;
            }
            
            .btn-voltar {
                width: 100%;
            }
            
            .comments-title {
                font-size: 1.5rem;
            }
            
            .comments-section {
                padding: 1.5rem 1rem;
            }
            
            /* Distância ainda menor no mobile */
            .images-container {
                gap: 0.15rem;
            }
        }
    </style>
</head>
