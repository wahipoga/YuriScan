<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>soulmate - Capítulo 01</title>

    <link rel="icon" type="image/png" href="https://i.ibb.co/Df60WbW7/381-Sem-T-tulo-20260302131259.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c0f;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
        }

        /* Header simples */
        .header {
            background: #0f1217;
            border-bottom: 2px solid #ff7b9c;
            padding: 1rem 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff7b9c, #ffa7b9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: #ff7b9c;
            font-size: 2rem;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
        }

        .discord-link {
            background: #5865F2;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Container principal */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Aviso Amazon no topo */
        .amazon-notice-top {
            background: #1e2329;
            border: 2px solid #ff7b9c;
            border-radius: 12px;
            padding: 15px 20px;
            margin: 20px 0 30px;
            text-align: center;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .amazon-notice-top strong {
            color: #ff7b9c;
            font-size: 1.1rem;
        }

        .amazon-notice-top p {
            color: #b0b8c5;
            font-size: 0.95rem;
        }

        .amazon-btn-top {
            background: #ff7b9c;
            color: #000;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: 0.2s;
            white-space: nowrap;
        }

        .amazon-btn-top:hover {
            background: #ff9bb3;
            transform: translateY(-2px);
        }

        /* Navegação simples */
        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            padding: 10px 0;
            border-bottom: 1px solid #2a313c;
        }

        .nav-top a {
            color: #ff7b9c;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .nav-top a:hover {
            text-decoration: underline;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background: #1e2329;
            border: 1px solid #2a313c;
            color: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .nav-btn:hover {
            border-color: #ff7b9c;
            color: #ff7b9c;
        }

        .nav-btn.primary {
            background: #ff7b9c;
            color: #000;
            border: none;
        }

        .nav-btn.primary:hover {
            background: #ff9bb3;
            color: #000;
        }

        .nav-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        /* Informações do capítulo */
        .chapter-info {
            margin: 30px 0 20px;
        }

        .chapter-info h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .chapter-info h2 {
            font-size: 1.2rem;
            color: #b0b8c5;
            font-weight: 400;
        }

        /* Área de leitura - imagens uma abaixo da outra */
        .reading-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin: 30px 0;
        }

        .reading-area img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }

        /* Botão voltar ao topo */
        .top-fixed {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #ff7b9c;
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.5rem;
            backdrop-filter: blur(5px);
            z-index: 99;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }

        .top-fixed.visible {
            opacity: 1;
            visibility: visible;
        }

        .top-fixed:hover {
            background: #ff7b9c;
            color: #000;
        }

        /* Navegação inferior (antes dos comentários) */
        .nav-bottom {
            display: flex;
            gap: 10px;
            margin: 30px 0;
        }

        .nav-bottom .nav-btn {
            flex: 1;
            text-align: center;
        }

        /* Seção de comentários do Disqus */
        .comments-section {
            margin: 40px 0;
        }

        .comments-section h3 {
            font-size: 1.3rem;
            border-left: 4px solid #ff7b9c;
            padding-left: 15px;
            margin-bottom: 20px;
        }

        /* Footer */
        .footer {
            background: #0f1217;
            border-top: 2px solid #ff7b9c;
            padding: 30px 20px;
            text-align: center;
            margin-top: 50px;
        }

        .footer p {
            color: #4a525f;
            max-width: 600px;
            margin: 10px auto;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .nav-links {
                display: none;
                position: fixed;
                top: 70px;
                left: 0;
                right: 0;
                background: #0f1217;
                flex-direction: column;
                padding: 20px;
                border-bottom: 2px solid #ff7b9c;
            }

            .nav-links.show {
                display: flex;
            }

            .nav-top {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .nav-buttons {
                width: 100%;
            }

            .nav-btn {
                flex: 1;
                text-align: center;
            }

            .top-fixed {
                bottom: 20px;
                right: 20px;
                width: 45px;
                height: 45px;
            }

            .nav-bottom {
                flex-direction: column;
            }

            .amazon-notice-top {
                flex-direction: column;
                gap: 10px;
            }
            
            .amazon-btn-top {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>

    <script>
        // Menu mobile
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('show');
        }

        // Fechar menu ao clicar fora
        document.addEventListener('click', function(e) {
            const nav = document.getElementById('navLinks');
            const btn = document.querySelector('.menu-toggle');
            if (!nav.contains(e.target) && !btn.contains(e.target)) {
                nav.classList.remove('show');
            }
        });

        // Scroll to top
        function scrollToTop() {
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // Mostrar botão ao rolar
        window.addEventListener('scroll', function() {
            const btn = document.getElementById('topBtn');
            if (window.scrollY > 300) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        });
    </script>
